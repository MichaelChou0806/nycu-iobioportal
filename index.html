<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCGA Gene Expression Explorer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div>
    <h1>TCGA Gene Expression Explorer</h1>
    <div class="sub">Modular build · group comparison (Mann–Whitney U)</div>
  </div>
  <div class="field">
    <label>Dataset</label>
    <select id="datasetSelect"></select>
  </div>
</header>

<div class="wrap">
  <nav id="analysisNav" class="tabs"></nav>
  <div id="appStatus" class="status">Loading reference data…</div>
  <main id="analysisPanel"></main>
</div>

<!-- 用 ES module 載入；因此要透過 http://localhost 開啟，不能雙擊 file:// -->
<script type="module" src="js/app.js"></script>
</body>
</html>
